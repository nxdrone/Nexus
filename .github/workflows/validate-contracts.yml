name: Validate Contracts

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          files = list(Path('.').rglob('*.json'))
          if not files:
              raise SystemExit('No JSON files found to validate.')

          for path in files:
              with path.open('r', encoding='utf-8') as fh:
                  json.load(fh)
              print(f'OK: {path}')
          PY

      - name: TODO schema validation
        run: |
          echo "TODO: Validate contract artifacts against shared/profile schemas."
