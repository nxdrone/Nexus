name: Validate Contracts

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate JSON syntax
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          files = list(Path('.').rglob('*.json'))
          if not files:
              raise SystemExit('No JSON files found to validate.')

          for path in files:
              with path.open('r', encoding='utf-8') as fh:
                  json.load(fh)
              print(f'OK: {path}')
          PY

      - name: Run NC1 contract validator
        run: |
          python tools/validate/contracts/validate_contracts.py --profile nc1

  drift-dry-run:
    runs-on: ubuntu-latest
    needs: validate-contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compare sample implementation manifest (non-blocking)
        run: |
          python tools/drift/compare_manifest_to_contract.py \
            --manifest tools/drift/examples/sample_nc1_impl_manifest.json \
            --allow-drift
